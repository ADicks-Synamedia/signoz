version: "3"

services:
  postgres:
    image: postgres:16
    container_name: signoz-postgres
    networks:
      - signoz-net
    restart: unless-stopped
    environment:
      POSTGRES_USER: signoz
      POSTGRES_PASSWORD: ${SIGNOZ_PG_PASSWORD:-signoz}
      POSTGRES_DB: signoz
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signoz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: 50m
        max-file: "3"

  signoz:
    environment:
      - SIGNOZ_SQLSTORE_PROVIDER=postgres
      - SIGNOZ_SQLSTORE_POSTGRES_DSN=postgres://signoz:${SIGNOZ_PG_PASSWORD:-signoz}@postgres:5432/signoz?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
    name: signoz-postgres
